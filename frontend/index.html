<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exoplanet Habitability Predictor</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="fw-bold">Exoplanet Habitability Predictor</h1>
      <p class="text-muted">
        Enter planetary and stellar parameters to get a habitability prediction.
      </p>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-8 mx-auto">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <form id="predictForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <h5 class="section-title">Planetary Parameters</h5>
                </div>
                <div class="col-md-6">
                  <h5 class="section-title">Stellar Parameters</h5>
                </div>
              </div>

              <div class="row g-3 mt-1">
                <div class="col-md-6">
                  <label class="form-label">Planet Radius</label>
                  <input type="number" step="any" class="form-control" name="planet_radius" placeholder="e.g. 1.1" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Star Temperature</label>
                  <input type="number" step="any" class="form-control" name="star_temperature" placeholder="e.g. 5778" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Planet Mass</label>
                  <input type="number" step="any" class="form-control" name="planet_mass" placeholder="e.g. 1.0" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Star Luminosity</label>
                  <input type="number" step="any" class="form-control" name="star_luminosity" placeholder="e.g. 1.0" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Orbital Period</label>
                  <input type="number" step="any" class="form-control" name="orbital_period" placeholder="e.g. 365" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Star Metallicity</label>
                  <input type="number" step="any" class="form-control" name="star_metallicity" placeholder="e.g. 0.02" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Semi-major Axis</label>
                  <input type="number" step="any" class="form-control" name="semi_major_axis" placeholder="e.g. 1.0" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Star Spectral Type</label>
                  <input type="text" class="form-control" name="star_spectype" placeholder="e.g. G2V" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Equilibrium Temperature</label>
                  <input type="number" step="any" class="form-control" name="eq_temperature" placeholder="e.g. 288" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Planet Density</label>
                  <input type="number" step="any" class="form-control" name="planet_density" placeholder="e.g. 5.5" required />
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                  Predict Habitability
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8 mx-auto">
        <div id="messageBox" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm border-0 mt-3">
          <div class="card-body p-4">
            <h4 class="mb-3">Prediction Result</h4>
            <div class="row g-3">
              <div class="col-md-6">
                <div class="result-card">
                  <div class="result-label">Habitability Status</div>
                  <div id="statusValue" class="result-value">—</div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="result-card">
                  <div class="result-label">Habitability Score</div>
                  <div id="scoreValue" class="result-value">—</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
